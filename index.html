<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassan Hegaze | Elite Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* 🔥 LOADING */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  font-size: 25px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
  background: linear-gradient(270deg,#22c55e,#0ea5e9,#22c55e);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

.hero h1 {
  font-size: 55px;
}

.btn {
  padding: 14px 28px;
  margin: 10px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

.primary {
  background: black;
  color: #22c55e;
}

.section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  margin-top: 20px;
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.footer {
  text-align: center;
  padding: 40px;
  opacity: 0.5;
}
</style>
</head>

<body>

<!-- 💀 LOADER -->
<div id="loader">Loading...</div>

<!-- HERO -->
<div class="hero">
<h1>I Dominate Arabic Content</h1>
<a class="btn primary" href="https://www.upwork.com/freelancers/~01983fdfaca07da39c" target="_blank">Hire Me</a>
</div>

<!-- SECTIONS -->
<div class="section">
<div class="card">✔ 5+ Years Experience</div>
<div class="card">✔ 500K+ Words</div>
<div class="card">✔ 99% Accuracy</div>
</div>

<div class="section">
<div class="card">Technical Translation</div>
<div class="card">Legal Translation</div>
<div class="card">Localization</div>
</div>

<div class="footer">© 2026 Hassan</div>

<!-- 🤖 FREE AI CHAT (Tawk.to) -->
<script>
var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
(function(){
var s1=document.createElement("script"),
s0=document.getElementsByTagName("script")[0];
s1.async=true;
s1.src='https://embed.tawk.to/REPLACE_ID/default';
s1.charset='UTF-8';
s1.setAttribute('crossorigin','*');
s0.parentNode.insertBefore(s1,s0);
})();

<!-- 🔥 JS -->
<script>
// Loader
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

// Scroll animation
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
